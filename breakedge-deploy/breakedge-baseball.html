<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0A1628;--gold:#F5A623;--green:#32C864;--red:#FF6B6B;--purple:#6C3FC5;--teal:#00C9C9;--orange:#E85D04;--white:#fff;--muted:#6B7A99;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.1)}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;padding:16px}
.wrap{max-width:960px;margin:0 auto}
.header{text-align:center;padding:16px 0 12px}
.nav-links{display:flex;justify-content:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.nav-link{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:3px}
.nav-link.active{color:var(--gold);border-color:var(--gold)}
.nav-link:hover:not(.active){color:var(--white);border-color:rgba(255,255,255,.3)}

.prod-tabs{display:flex;gap:6px;margin:14px 0;flex-wrap:wrap}
.prod-tab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:8px 14px;border-radius:4px;border:1.5px solid var(--border);cursor:pointer;color:var(--muted);background:rgba(255,255,255,.03)}
.prod-tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.prod-tab:not(.active):hover{border-color:var(--gold);color:var(--gold)}

.controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.ctrl-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:7px 14px;border-radius:4px;border:1px solid var(--border);cursor:pointer;color:var(--muted);background:rgba(255,255,255,.04)}
.ctrl-btn.active{background:rgba(245,166,35,.15);color:var(--gold);border-color:var(--gold)}
.box-input{display:flex;align-items:center;gap:8px;margin-left:auto}
.box-input label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.06em}
.box-input input{width:60px;padding:7px 10px;background:rgba(255,255,255,.07);border:1.5px solid var(--border);border-radius:4px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--white);outline:none;text-align:center}
.box-input input:focus{border-color:var(--gold)}

.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:20px}
.team-card{background:var(--card);border:1.5px solid var(--border);border-radius:7px;padding:13px 14px;cursor:pointer;transition:all .15s;position:relative}
.team-card:hover{border-color:var(--gold);transform:translateY(-1px);background:rgba(245,166,35,.06)}
.team-card.anomaly{border-color:rgba(255,107,107,.5)}
.team-card.anomaly:hover{border-color:var(--red);background:rgba(255,107,107,.06)}
.team-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;text-transform:uppercase;color:var(--white);margin-bottom:3px}
.team-ev{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--gold);line-height:1;margin-bottom:4px}
.team-note{font-size:10px;color:var(--muted);line-height:1.5}
.anomaly-badge{position:absolute;top:8px;right:10px;font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--red);letter-spacing:.04em}
.tier-dot{position:absolute;bottom:8px;right:10px;width:8px;height:8px;border-radius:50%}
.tier-s{background:var(--green)}
.tier-a{background:var(--gold)}
.tier-b{background:var(--muted)}
.tier-c{background:rgba(255,255,255,.2)}

.eval-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:14px}
.card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg label{display:block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.fg input,.fg select{width:100%;padding:9px 12px;background:rgba(255,255,255,.07);border:1.5px solid var(--border);border-radius:4px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--white);outline:none}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
.fg select option{background:#1a2a3a}
.eval-btn{width:100%;background:var(--gold);color:var(--navy);border:none;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;text-transform:uppercase;border-radius:5px;cursor:pointer;margin-top:12px;letter-spacing:.08em}
.eval-btn:hover{background:#FFD166}
.result-box{display:none;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:16px;margin-top:14px}
.result-box.show{display:block}
.zones{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.zone{padding:12px;border-radius:5px;text-align:center}
.zone-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.zone-val{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1}
.zone-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:3px}
.zone-deal{background:rgba(50,200,100,.1);border:2px solid var(--green)}
.zone-deal .zone-label{color:var(--green)}.zone-deal .zone-val{color:var(--green)}
.zone-fair{background:rgba(245,166,35,.08);border:2px solid var(--gold)}
.zone-fair .zone-label{color:var(--gold)}.zone-fair .zone-val{color:var(--gold)}
.zone-hard{background:rgba(255,107,107,.08);border:2px solid var(--red)}
.zone-hard .zone-label{color:var(--red)}.zone-hard .zone-val{color:var(--red)}
.verdict{padding:10px 14px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.06em}
.verdict.stash{background:rgba(50,200,100,.15);border:2px solid var(--green);color:var(--green)}
.verdict.pass{background:rgba(255,107,107,.12);border:2px solid var(--red);color:var(--red)}

.data-note{background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.2);border-radius:6px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:#8BAFC6;line-height:1.6}
.prod-info{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:14px}
.prod-info h4{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);margin-bottom:8px}
.prod-info p{font-size:12px;color:#8BAFC6;line-height:1.65}
.prod-stat{display:inline-block;background:rgba(0,201,201,.1);border:1px solid rgba(0,201,201,.2);border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--teal);padding:2px 8px;margin:3px 3px 0 0}

footer{text-align:center;font-size:11px;color:var(--muted);margin-top:20px;padding-top:14px;border-top:1px solid var(--border)}
footer a{color:var(--gold);text-decoration:none}

@media(max-width:600px){.g3,.zones{grid-template-columns:1fr}.team-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}.prod-tabs{gap:4px}.prod-tab{font-size:11px;padding:7px 10px}}
</style>
</head>

// ── STATE ──
let currentProduct = 'chrome_plat';
let sortMode = 'ev';

// ── PRODUCT TABS ──
function setProduct(key){
  currentProduct = key;
  document.querySelectorAll('.prod-tab').forEach((b,i)=>{
    const keys = ['chrome_plat','tier_one','dynasty','inception','chrome_plat_6'];
    b.classList.toggle('active', keys[i]===key);
  });
  const prod = PRODUCTS[key];
  document.getElementById('prodInfo').innerHTML = `
    <h4>${prod.name}</h4>
    <p>${prod.note}</p>
    <div style="margin-top:8px">
      ${prod.tags.map(t=>`<span class="prod-stat">${t}</span>`).join('')}
      <span class="prod-stat" style="background:rgba(50,200,100,.1);border-color:rgba(50,200,100,.2);color:var(--green)">~$${prod.boxPrice}/box</span>
      <span class="prod-stat" style="background:rgba(255,107,107,.08);border-color:rgba(255,107,107,.2);color:var(--red)">${prod.caseBoxes} boxes/case</span>
      <span class="prod-stat" style="background:rgba(108,63,197,.1);border-color:rgba(108,63,197,.2);color:#A78BF5">${prod.confidence} CONFIDENCE</span>
    </div>`;
  document.getElementById('dataNoteBox').textContent = prod.dataNote;
  // update default box count
  document.getElementById('box-count').value = prod.caseBoxes;
  document.getElementById('ev-boxes').value = prod.caseBoxes;
  populateTeamSelect();
  renderGrid();
}

function populateTeamSelect(){
  const sel = document.getElementById('ev-team');
  const teams = [...TEAMS[currentProduct]].sort((a,b)=>a.name.localeCompare(b.name));
  sel.innerHTML = teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
}

// ── GRID ──
function renderGrid(){
  const boxes = +document.getElementById('box-count').value || PRODUCTS[currentProduct].caseBoxes;
  const caseBoxes = PRODUCTS[currentProduct].caseBoxes;
  let teams = [...TEAMS[currentProduct]];
  if(sortMode === 'ev') teams.sort((a,b)=>b.ev-a.ev);
  else teams.sort((a,b)=>a.name.localeCompare(b.name));
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = teams.map(t=>{
    const ev = Math.round(t.ev * (boxes / caseBoxes));
    const tierColor = t.tier==='s'?'var(--green)':t.tier==='a'?'var(--gold)':t.tier==='b'?'var(--muted)':'rgba(255,255,255,.2)';
    return `<div class="team-card${t.anomaly?' anomaly':''}" onclick="quickEval('${t.id}')">
      ${t.anomaly?`<div class="anomaly-badge">⚠️ ANOMALY</div>`:''}
      <div class="team-name">${t.name}</div>
      <div class="team-ev">$${ev}</div>
      <div class="team-note">${t.note}</div>
      <div class="tier-dot" style="background:${tierColor}"></div>
    </div>`;
  }).join('');
}

function sortTeams(mode){
  sortMode = mode;
  document.getElementById('sort-ev').classList.toggle('active', mode==='ev');
  document.getElementById('sort-az').classList.toggle('active', mode==='az');
  renderGrid();
}

// ── EVALUATOR ──
function quickEval(id){
  document.getElementById('ev-team').value = id;
  const boxes = +document.getElementById('box-count').value || PRODUCTS[currentProduct].caseBoxes;
  document.getElementById('ev-boxes').value = boxes;
  evaluate();
  document.getElementById('resultBox').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function evaluate(){
  const teamId = document.getElementById('ev-team').value;
  const asked = +document.getElementById('ev-price').value;
  const boxes = +document.getElementById('ev-boxes').value || PRODUCTS[currentProduct].caseBoxes;
  const caseBoxes = PRODUCTS[currentProduct].caseBoxes;
  const team = TEAMS[currentProduct].find(t=>t.id===teamId);
  if(!team){ alert('Select a team'); return; }
  if(!asked){ alert('Enter a price'); return; }

  const baseEV = Math.round(team.ev * (boxes / caseBoxes));
  const deal = Math.round(baseEV * 0.80);
  const fair = baseEV;
  const hard = Math.round(baseEV * 1.25);

  document.getElementById('rDeal').textContent = `$${deal}`;
  document.getElementById('rFair').textContent = `$${fair}`;
  document.getElementById('rHard').textContent = `$${hard}`;

  const verdict = document.getElementById('rVerdict');
  const note = document.getElementById('rNote');
  if(asked <= deal){
    verdict.className = 'verdict stash';
    verdict.textContent = `✅ Strong Buy — ${team.name} at $${asked} is well under EV`;
  } else if(asked <= fair){
    verdict.className = 'verdict stash';
    verdict.textContent = `🟡 Fair value — ${team.name} at $${asked} is at or below market`;
  } else if(asked <= hard){
    verdict.className = 'verdict pass';
    verdict.textContent = `⚠️ Stretch — $${asked} is above EV but within range`;
  } else {
    verdict.className = 'verdict pass';
    verdict.textContent = `🔴 Pass — $${asked} is significantly over EV for ${team.name}`;
  }
  note.textContent = `${team.name} base EV (${boxes} boxes, ${PRODUCTS[currentProduct].name}): $${baseEV} · ${team.note}`;
  document.getElementById('resultBox').classList.add('show');
}

// ── INIT ──
setProduct('chrome_plat');
